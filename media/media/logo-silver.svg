<svg viewBox="0 0 520 140" xmlns="http://www.w3.org/2000/svg" width="520" height="140">
  <defs>
    <linearGradient id="sm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8C4B0"/>
      <stop offset="40%" stop-color="#A8A494"/>
      <stop offset="100%" stop-color="#686458"/>
    </linearGradient>
    <linearGradient id="sd" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#888478"/>
      <stop offset="100%" stop-color="#484440"/>
    </linearGradient>
    <linearGradient id="sn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D0CCC0"/>
      <stop offset="100%" stop-color="#808078"/>
    </linearGradient>
    <filter id="sglow">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- MESH SEMBOLÜ -->
  <g transform="translate(10, 0)">
    <circle cx="70" cy="70" r="22" fill="none" stroke="url(#sd)" stroke-width="0.8" opacity="0.22"/>
    <circle cx="70" cy="70" r="40" fill="none" stroke="url(#sd)" stroke-width="0.5" opacity="0.12"/>

    <line x1="70" y1="70" x2="22" y2="22" stroke="url(#sd)" stroke-width="1.3" opacity="0.55"/>
    <line x1="70" y1="70" x2="118" y2="22" stroke="url(#sd)" stroke-width="1.3" opacity="0.55"/>
    <line x1="70" y1="70" x2="22" y2="118" stroke="url(#sd)" stroke-width="1.3" opacity="0.55"/>
    <line x1="70" y1="70" x2="118" y2="118" stroke="url(#sd)" stroke-width="1.3" opacity="0.55"/>
    <line x1="70" y1="70" x2="70" y2="8" stroke="url(#sd)" stroke-width="1" opacity="0.28"/>
    <line x1="70" y1="70" x2="70" y2="132" stroke="url(#sd)" stroke-width="1" opacity="0.28"/>
    <line x1="70" y1="70" x2="8" y2="70" stroke="url(#sd)" stroke-width="1" opacity="0.28"/>
    <line x1="70" y1="70" x2="132" y2="70" stroke="url(#sd)" stroke-width="1" opacity="0.28"/>

    <line x1="22" y1="22" x2="118" y2="22" stroke="url(#sd)" stroke-width="0.7" opacity="0.18"/>
    <line x1="22" y1="118" x2="118" y2="118" stroke="url(#sd)" stroke-width="0.7" opacity="0.18"/>
    <line x1="22" y1="22" x2="22" y2="118" stroke="url(#sd)" stroke-width="0.7" opacity="0.18"/>
    <line x1="118" y1="22" x2="118" y2="118" stroke="url(#sd)" stroke-width="0.7" opacity="0.18"/>

    <circle cx="22" cy="22" r="5" fill="url(#sd)" opacity="0.8" filter="url(#sglow)"/>
    <circle cx="118" cy="22" r="5" fill="url(#sd)" opacity="0.8" filter="url(#sglow)"/>
    <circle cx="22" cy="118" r="5" fill="url(#sd)" opacity="0.8" filter="url(#sglow)"/>
    <circle cx="118" cy="118" r="5" fill="url(#sd)" opacity="0.8" filter="url(#sglow)"/>
    <circle cx="70" cy="8" r="3.5" fill="url(#sd)" opacity="0.45"/>
    <circle cx="70" cy="132" r="3.5" fill="url(#sd)" opacity="0.45"/>
    <circle cx="8" cy="70" r="3.5" fill="url(#sd)" opacity="0.45"/>
    <circle cx="132" cy="70" r="3.5" fill="url(#sd)" opacity="0.45"/>

    <circle cx="70" cy="70" r="10" fill="url(#sn)" filter="url(#sglow)"/>
    <circle cx="70" cy="70" r="6" fill="#C8C4B0"/>
    <circle cx="67" cy="67" r="2" fill="rgba(255,255,255,0.3)"/>
  </g>

  <!-- YAZILI KISIM -->
  <g transform="translate(168, 0)">
    <text x="0" y="88" font-family="'Share Tech Mono', 'Courier New', monospace" font-size="68" fill="url(#sm)" font-weight="bold" letter-spacing="3">GRIDNET</text>
    <line x1="0" y1="100" x2="346" y2="100" stroke="url(#sd)" stroke-width="1.5" opacity="0.35"/>
    <text x="0" y="120" font-family="'Share Tech Mono', 'Courier New', monospace" font-size="11.5" fill="url(#sd)" letter-spacing="6" opacity="0.7">POWERLINE MESH TERMINAL</text>
  </g>
</svg>
